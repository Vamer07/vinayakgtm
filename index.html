<!DOCTYPE html>
<div id="message"></div>

<script>
let cards = ["A", "X", "X"];
let positions = [0,1,2];
let shuffling = false;
let difficulty = 120; // speed (lower = faster)

function renderCards(show = false) {
  const game = document.getElementById("game");
  game.innerHTML = "";

  positions.forEach((pos, index) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = show ? cards[pos] : "?";
    div.onclick = () => pickCard(index);
    game.appendChild(div);
  });
}

function shuffleStep() {
  let i = Math.floor(Math.random()*3);
  let j = Math.floor(Math.random()*3);
  [positions[i], positions[j]] = [positions[j], positions[i]];
}

function insaneShuffle(iterations) {
  if(iterations <= 0) {
    shuffling = false;
    renderCards(false);
    return;
  }

  shuffleStep();
  renderCards(false);

  setTimeout(() => insaneShuffle(iterations - 1), difficulty);
}

function startGame() {
  document.getElementById("message").innerText = "Memorize...";

  // randomize ace start
  cards = shuffleArray(cards);
  positions = [0,1,2];

  renderCards(true);

  setTimeout(() => {
    shuffling = true;
    document.getElementById("message").innerText = "Shuffling...";

    // gets harder each time
    difficulty = Math.max(20, difficulty - 10);

    insaneShuffle(40 + Math.floor(Math.random()*40));
  }, 1200);
}

function pickCard(index) {
  if(shuffling) return;

  const chosen = positions[index];
  const result = cards[chosen];

  renderCards(true);

  if(result === "A") {
    document.getElementById("message").innerText = "You got lucky 😳";
  } else {
    document.getElementById("message").innerText = "Nope 💀";
  }
}

function shuffleArray(arr) {
  let a = [...arr];
  for(let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
</script>

</body>
</html>
